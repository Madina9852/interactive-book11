<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Книга</title>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Turn.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #8ec5fc, #e0c3fc);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* книга */
#book {
    width: 90vw;
    max-width: 800px;
    height: 500px;
    margin-top: 30px;
}

/* страницы */
.page {
    background: white;
}

.page img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* кнопки */
.buttons {
    margin: 20px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="book">

    <div class="page"><img src="page1.jpg"></div>
    <div class="page"><img src="page2.jpg"></div>
    <div class="page"><img src="page3.jpg"></div>
    <div class="page"><img src="page4.jpg"></div>
    <div class="page"><img src="page5.jpg"></div>

</div>

<div class="buttons">
    <button onclick="prevPage(page6.html)">← Артқа</button>
    <button onclick="nextPage(page8.html)">Алдыға →</button>
</div>

<script>
$("#book").turn({
    width: 800,
    height: 500,
    autoCenter: true
});

// кнопки
function nextPage() {
    $("#book").turn("next");
}

function prevPage() {
    $("#book").turn("previous");
}
</script>

</body>
</html>
